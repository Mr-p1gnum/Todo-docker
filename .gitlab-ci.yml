stages:
  - build
  - test
  - deploy_dev
  - deploy_prod


variables:
  CI_REGISTRY_IMAGE: todo-app
  IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA

image: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest

default:
  artifacts:
    paths:
      - image/

build-job:
  stage: build
  before_script:
    - mkdir image
  script: 
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    - echo "Build Started"
    - docker build . -t $IMAGE 
    - docker tag $IMAGE $DOCKERHUB_USERNAME/cicd:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKERHUB_USERNAME/cicd:$CI_COMMIT_SHORT_SHA
    - ls -lah
    - echo "Build completed"
    
test-job:
  stage: test
  script: 
    - docker load -i image/todo-app.tar.gz
    - docker run $IMAGE npm test



deploy_to_dev_job:
  stage: deploy_dev
  rules:
    - if: $CI_COMMIT_BRANCH == 'dev'
  script:
    - echo "Deploy Started"
    - echo "Deploying...">> $LOG_FILE_NAME
    - echo "Deploy completed"
    - cat $LOG_FILE_NAME

deploy_to_prod_job:
  stage: deploy_prod
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'
  script:
    - echo "---Deploy to PROD Started---"
    - echo "Deploy to PROD..." >> $LOG_FILE_NAME
    - echo "---Deploy to PROD Completed---"  
    - cat $LOG_FILE_NAME
