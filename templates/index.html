<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List приложение</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>📋 Todo List</h1>
        
        <div class="add-task">
            <input type="text" id="taskInput" placeholder="Введите новую задачу...">
            <button onclick="addTask()">Добавить</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterTasks('all')">Все</button>
            <button class="filter-btn" onclick="filterTasks('active')">Активные</button>
            <button class="filter-btn" onclick="filterTasks('completed')">Выполненные</button>
        </div>

        <ul id="taskList" class="task-list"></ul>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
